services:
  db:
    build: ./database
    container_name: db-tesis
    restart: always
    environment:
      - POSTGRES_DB=${DB_NAME:-Proyecto-Tesis}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-huachimingo} # <--- Tu contraseña aquí
    ports:
      - "${DB_HOST_PORT:-5433}:5432"   # <--- expone el Postgres del contenedor en localhost:5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-Proyecto-Tesis}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: backend-tesis
    environment:
      - HOST=0.0.0.0
      - PORT=${BACKEND_PORT:-3000}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-huachimingo}
      - DATABASE=${DB_NAME:-Proyecto-Tesis}
      - JWT_SECRET=fknoljifyjfcyxloloqdsjgctvtvnvqlpsmftlnvvuvyteamcmiiggtwzeeedhofpnpuwfssxfpxiadmfyulscglhciaufssmrttolhulkiyqygmbcutzthunckqzaox     
      - COOKIE_KEY=lvfvdxywuvkmggktdvngonbmuqcmhwsauqaupxxcdwangmuzbkammxtjtsxlqiigbghwdwxjregqoaoudsgpwjvrtoeesubhclyalwfdmhmdhiftpepkoxzigshfggdy
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend_net
      - frontend_net

  frontend:
    build: ./frontend
    container_name: frontend-tesis
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend
    networks:
      - frontend_net

networks:
  frontend_net:
  backend_net:

volumes:
  postgres_data: